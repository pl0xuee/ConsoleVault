name: Release

# Build the Linux AppImage and attach it to a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed. The release is created as a draft so you
# can review the assets and edit notes before publishing.
#
# The build runs inside an Arch Linux container ON PURPOSE: AppImages bundle the
# host's WebKitGTK, and Ubuntu's older WebKit fails to initialise EGL on modern
# rolling-release distros (blank/white window). Building on Arch bundles a recent
# WebKit (2.5x) that renders correctly. Trade-off: the resulting AppImage needs a
# reasonably recent glibc, so it targets modern distros.
on:
  push:
    tags:
      - "v*"

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      # --privileged exposes /dev/fuse so the AppImage tooling
      # (linuxdeploy/appimagetool, themselves AppImages) can mount and run.
      options: --privileged
    env:
      # Belt-and-suspenders: also allow extract-and-run if FUSE is unavailable.
      APPIMAGE_EXTRACT_AND_RUN: 1
      # linuxdeploy's bundled `strip` is too old for Arch's modern libraries
      # (fails on the `.relr.dyn` ELF section), which aborts bundling. Skip strip.
      NO_STRIP: "true"
    steps:
      # Installed before checkout so `git` exists for actions/checkout, and so the
      # build uses Arch's current toolchain + WebKit.
      - name: Install system dependencies (Arch)
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl wget file \
            rust nodejs npm \
            webkit2gtk-4.1 gtk3 librsvg \
            patchelf openssl fuse2 \
            xdg-utils desktop-file-utils shared-mime-info

      - name: Checkout
        uses: actions/checkout@v4

      # Checkout runs as root in the container; avoid git "dubious ownership".
      - name: Trust workspace
        run: git config --global --add safe.directory '*'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater. tauri-action signs the AppImage and
          # generates/uploads latest.json when these are present.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ConsoleVault ${{ github.ref_name }}"
          releaseBody: "Download the `.AppImage` below, then `chmod +x` and run it. Requires a recent Linux (glibc 2.38+)."
          releaseDraft: true
          prerelease: false
          # bundle.targets in tauri.conf.json is already ["appimage"]; this keeps
          # the CI intent explicit and future-proof if that changes.
          args: --bundles appimage

      # Tauri swallows linuxdeploy's output; on failure, rerun it by hand on the
      # AppDir Tauri already created so we can see the real error.
      - name: Diagnose linuxdeploy failure
        if: failure()
        run: |
          set -x
          cd src-tauri/target/release/bundle/appimage || { ls -la src-tauri/target/release/bundle || true; exit 0; }
          ls -la
          APPDIR=$(ls -d *.AppDir 2>/dev/null | head -1); echo "APPDIR=$APPDIR"
          [ -z "$APPDIR" ] && exit 0
          curl -sL https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage -o ld.AppImage
          curl -sL https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh -o linuxdeploy-plugin-gtk.sh
          chmod +x ld.AppImage linuxdeploy-plugin-gtk.sh
          export APPIMAGE_EXTRACT_AND_RUN=1 NO_STRIP=true
          echo "=== manual linuxdeploy run ==="
          ./ld.AppImage --appdir "$APPDIR" --plugin gtk --output appimage 2>&1 | tail -80 || echo "manual linuxdeploy exit: $?"
