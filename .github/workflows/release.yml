name: Release

# Build the Linux AppImage and attach it to a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed. The release is created as a draft so you
# can review the assets and edit notes before publishing.
#
# The build runs inside an Arch Linux container ON PURPOSE: AppImages bundle the
# host's WebKitGTK, and Ubuntu's older WebKit fails to initialise EGL on modern
# rolling-release distros (blank/white window). Building on Arch bundles a recent
# WebKit (2.5x) that renders correctly. Trade-off: the resulting AppImage needs a
# reasonably recent glibc, so it targets modern distros.
on:
  push:
    tags:
      - "v*"

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    env:
      # AppImage tooling (linuxdeploy/appimagetool) can't use FUSE inside a
      # container, so tell it to extract-and-run instead of mounting.
      APPIMAGE_EXTRACT_AND_RUN: 1
    steps:
      # Installed before checkout so `git` exists for actions/checkout, and so the
      # build uses Arch's current toolchain + WebKit.
      - name: Install system dependencies (Arch)
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl wget file \
            rust nodejs npm \
            webkit2gtk-4.1 gtk3 librsvg \
            patchelf openssl fuse2 \
            xdg-utils desktop-file-utils shared-mime-info

      - name: Checkout
        uses: actions/checkout@v4

      # Checkout runs as root in the container; avoid git "dubious ownership".
      - name: Trust workspace
        run: git config --global --add safe.directory '*'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build AppImage and publish draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater. tauri-action signs the AppImage and
          # generates/uploads latest.json when these are present.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ConsoleVault ${{ github.ref_name }}"
          releaseBody: "Download the `.AppImage` below, then `chmod +x` and run it. Requires a recent Linux (glibc 2.38+)."
          releaseDraft: true
          prerelease: false
          # bundle.targets in tauri.conf.json is already ["appimage"]; this keeps
          # the CI intent explicit and future-proof if that changes.
          args: --bundles appimage
