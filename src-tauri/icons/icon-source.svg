<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c353d"/>
      <stop offset="1" stop-color="#161b20"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fa9bd"/>
      <stop offset="0.55" stop-color="#5a8ca6"/>
      <stop offset="1" stop-color="#436f86"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Gunmetal rounded-square backdrop -->
  <rect x="40" y="40" width="944" height="944" rx="200" fill="url(#bg)"/>
  <rect x="40" y="40" width="944" height="944" rx="200" fill="url(#sheen)"/>
  <rect x="41.5" y="41.5" width="941" height="941" rx="198.5" fill="none" stroke="#3a454e" stroke-width="3"/>

  <!-- Gamepad -->
  <g filter="url(#soft)">
    <!-- body: two grips joined by a central bar -->
    <path fill="url(#body)" d="
      M 512 372
      C 610 372 636 396 690 404
      C 742 412 806 404 848 452
      C 902 514 900 628 856 690
      C 812 752 742 742 704 726
      C 664 709 560 704 512 704
      C 464 704 360 709 320 726
      C 282 742 212 752 168 690
      C 124 628 122 514 176 452
      C 218 404 282 412 334 404
      C 388 396 414 372 512 372 Z"/>

    <!-- D-pad (dark gunmetal) -->
    <g fill="#20272d">
      <rect x="300" y="500" width="150" height="52" rx="16"/>
      <rect x="349" y="451" width="52" height="150" rx="16"/>
    </g>

    <!-- Face buttons (diamond); top one warm-accent for a pop -->
    <circle cx="694" cy="486" r="30" fill="#d6a95a"/>
    <circle cx="640" cy="540" r="30" fill="#20272d"/>
    <circle cx="748" cy="540" r="30" fill="#20272d"/>
    <circle cx="694" cy="594" r="30" fill="#20272d"/>
  </g>
</svg>
